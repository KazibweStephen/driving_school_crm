<div class="p-4">
  <div class="flex justify-content-between align-items-center mb-4">
    <h1 class="text-2xl font-bold m-0">Schedule Breaks</h1>
    <button pButton label="Add Break" icon="pi pi-plus" (click)="openCreate()"></button>
  </div>

  <p-table [value]="breaks()" [loading]="loading()" [paginator]="true" [rows]="10" [rowsPerPageOptions]="[10, 25, 50]"
    sortField="start_time" [sortOrder]="1">
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="name">Name <p-sortIcon field="name"></p-sortIcon></th>
        <th pSortableColumn="start_time">Start <p-sortIcon field="start_time"></p-sortIcon></th>
        <th pSortableColumn="end_time">End <p-sortIcon field="end_time"></p-sortIcon></th>
        <th pSortableColumn="is_standard">Type <p-sortIcon field="is_standard"></p-sortIcon></th>
        <th pSortableColumn="is_active">Status <p-sortIcon field="is_active"></p-sortIcon></th>
        <th style="width: 12rem">Actions</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-b>
      <tr>
        <td><strong>{{ b.name }}</strong></td>
        <td>{{ b.start_time | slice:0:5 }}</td>
        <td>{{ b.end_time | slice:0:5 }}</td>
        <td>
          <p-tag *ngIf="b.is_standard" value="Standard" severity="info"></p-tag>
          <p-tag *ngIf="!b.is_standard" value="Conditional" severity="warn"></p-tag>
        </td>
        <td>
          <p-toggleswitch [ngModel]="b.is_active" (onChange)="toggleActive(b)" binary="true"
            appendTo="body"></p-toggleswitch>
        </td>
        <td>
          <button pButton icon="pi pi-pencil" class="p-button-text p-button-rounded p-button-sm mr-1"
            (click)="openEdit(b)" pTooltip="Edit" [disabled]="b.is_standard"></button>
          <button pButton icon="pi pi-trash" class="p-button-text p-button-rounded p-button-sm p-button-danger"
            (click)="confirmDelete(b)" pTooltip="Delete" [disabled]="b.is_standard"></button>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6" class="text-center text-gray-500 py-4">No schedule breaks configured</td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-dialog [(visible)]="showDialog" [header]="editingBreak() ? 'Edit Break' : 'New Break'" [modal]="true"
  [style]="{ width: '450px' }" appendTo="body">
  <div class="flex flex-column gap-3">
    <div>
      <label class="block mb-1 font-medium">Name</label>
      <input pInputText [(ngModel)]="form.name" class="w-full" placeholder="e.g. Lunch Break" />
    </div>
    <div class="flex gap-3">
      <div class="flex-1">
        <label class="block mb-1 font-medium">Start Time</label>
        <input pInputText type="time" [(ngModel)]="form.start_time" class="w-full" />
      </div>
      <div class="flex-1">
        <label class="block mb-1 font-medium">End Time</label>
        <input pInputText type="time" [(ngModel)]="form.end_time" class="w-full" />
      </div>
    </div>
    <div class="flex align-items-center gap-2">
      <p-toggleswitch [(ngModel)]="form.is_active" binary="true" appendTo="body"></p-toggleswitch>
      <label>Active</label>
    </div>
  </div>
  <ng-template pTemplate="footer">
    <button pButton label="Cancel" class="p-button-text" (click)="showDialog.set(false)"></button>
    <button pButton [label]="editingBreak() ? 'Update' : 'Create'" [disabled]="!form.name || !form.start_time || !form.end_time || loading()"
      (click)="save()"></button>
  </ng-template>
</p-dialog>

<p-confirmDialog appendTo="body"></p-confirmDialog>
<p-toast></p-toast>
